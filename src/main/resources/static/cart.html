<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cart</title>

  <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #000;
        color: white;
        margin: 0;
        padding: 10px;
    }

    h2 {
        text-align: center;
        margin-top: 10px;
        color: #ccc;
    }

    #table-info {
        text-align: center;
        color: #aaa;
        margin-bottom: 20px;
    }

    #cart-items {
        max-width: 600px;
        margin: auto;
    }

    .cart-item {
        background: #1c1c1c;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 12px;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 15px;
        align-items: center;
    }

    .item-left h3 { margin: 0; }
    .item-left p { color: orange; }

    .qty {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .qty button {
        padding: 5px 10px;
        background: #222;
        color: orange;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .remove-btn {
        background: red;
        border: none;
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .total {
        text-align: center;
        font-size: 20px;
        color: gold;
        margin-top: 20px;
    }

    .place-btn {
        display: block;
        width: 90%;
        max-width: 400px;
        margin: 20px auto;
        padding: 12px;
        font-size: 18px;
        background: orange;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
    }

  </style>
</head>

<body>

<h2>Your Cart</h2>
<h3 id="table-info"></h3>

<div id="cart-items"></div>

<div class="total" id="total-price">Total: ₹0</div>

<button class="place-btn" onclick="placeOrder()">Place Order</button>

<script>

  const tableId = localStorage.getItem("tableId");

  if(!tableId){
      alert("Select table first");
      window.location.href = "table.html";
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  // default qty
  cart.forEach(item => {
      if(!item.quantity) item.quantity = 1;
  });

  function renderCart(){

      const container = document.getElementById("cart-items");
      container.innerHTML = "";

      let total = 0;

      cart.forEach((item,index)=>{

          total += item.price * item.quantity;

          const div = document.createElement("div");
          div.className = "cart-item";

          div.innerHTML = `
          <div class="item-left">
              <h3>${item.name}</h3>
              <p>₹${item.price}</p>
          </div>

          <div class="qty">
              <button onclick="decreaseQty(${index})">-</button>
              <span>${item.quantity}</span>
              <button onclick="increaseQty(${index})">+</button>
          </div>

          <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
          `;

          container.appendChild(div);
      });

      document.getElementById("total-price").innerText = "Total: ₹" + total;
      document.getElementById("table-info").innerText = "Table: " + tableId;

      localStorage.setItem("cart", JSON.stringify(cart));
  }

  function increaseQty(i){
      cart[i].quantity++;
      renderCart();
  }

  function decreaseQty(i){
      if(cart[i].quantity > 1){
          cart[i].quantity--;
      } else {
          cart.splice(i,1);
      }
      renderCart();
  }

  function removeItem(i){
      cart.splice(i,1);
      renderCart();
  }

  async function placeOrder(){

      if(cart.length === 0){
          alert("Cart empty ❌");
          return;
      }

      let orderCode = localStorage.getItem("orderCode");

      let total = 0;
      cart.forEach(item => total += item.price * item.quantity);

      const orderData = {
          tableId: Number(tableId),
          items: JSON.stringify(cart),
          totalAmount: total
      };

      let url = "http://localhost:8080/api/orders";
      let method = "POST";

      if(orderCode && orderCode.startsWith("ORD")){
          url = `http://localhost:8080/api/orders/update/${orderCode}`;
          method = "PUT";
      }

      try {

          // 🔥 FIX: table ni occupied chey
          await fetch(`http://localhost:8080/api/tables/select/${tableId}`, {
              method: "POST"
          });

          const res = await fetch(url, {
              method: method,
              headers: {"Content-Type":"application/json"},
              body: JSON.stringify(orderData)
          });

          if(!res.ok){
              throw new Error(await res.text());
          }

          const data = await res.json();

          if(!orderCode){
              localStorage.setItem("orderCode", data.orderCode);
          }

          document.body.innerHTML = `
              <div style="
                  display:flex;
                  justify-content:center;
                  align-items:center;
                  height:100vh;
                  background:#111;
                  color:white;
              ">
                  <div style="
                      background:#1c1c1c;
                      padding:30px;
                      border-radius:15px;
                      text-align:center;
                  ">
                      <div style="font-size:60px;color:lightgreen;">✔</div>
                      <h2>Order Placed</h2>
                      <p>Order Code</p>
                      <h3 style="color:gold;">${data.orderCode}</h3>

                      <button onclick="goMenu()" style="
                          margin-top:15px;
                          padding:10px 20px;
                          border:none;
                          border-radius:8px;
                          background:orange;
                          font-weight:bold;
                          cursor:pointer;
                      ">Back to Menu</button>
                  </div>
              </div>
          `;

          localStorage.removeItem("cart");

      } catch(err){
          alert("Error: " + err.message);
      }
  }

  function goMenu(){
      window.location.href = "menu.html";
  }

  renderCart();

</script>

</body>
</html>
