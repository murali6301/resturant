spring.application.name=spring

# --- SUPABASE DATABASE CONFIGURATION ---
# Using the Supabase connection string with sslmode=require and prepareThreshold=0 to fix pooling errors
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.iteaoytfpzjhqvrqkeug
# For production, it's highly recommended to keep the password as an environment variable!
# However, it is hardcoded here as requested for immediate testing:
spring.datasource.password=balamurali@123
spring.datasource.driver-class-name=org.postgresql.Driver

# --- PRODUCTION CONNECTION POOLING (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# --- PRODUCTION JPA/HIBERNATE SETTINGS ---
# 'validate' ensures your Supabase tables match your Java entities, but won't alter the schema.
# (Make sure you've run the SQL script I gave you in Supabase first!)
# Changed to 'update' so Spring Boot automatically creates the missing tables in Supabase for you!
spring.jpa.hibernate.ddl-auto=update
# Turn off SQL logging for better performance in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}